<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KX App (Firebase Live)</title>

<style>
body { font-family: Arial; margin:0; padding:20px; background:#0A1628; color:#fff; }
.card { background:#132040; padding:15px; margin-bottom:10px; border-radius:10px; }
button { padding:8px 12px; margin-top:5px; }
input { padding:6px; margin:4px 0; }
</style>
</head>
<body>

<h2>🚚 Khalorna Xpress Dashboard</h2>

<div class="card">
  <h3>Summary</h3>
  <p>Total Trips: <span id="totalTrips">0</span></p>
  <p>Completed Trips: <span id="completedTrips">0</span></p>
</div>

<div class="card">
  <h3>Add Trip</h3>
  <input id="destination" placeholder="Destination" />
  <input id="amount" placeholder="Amount" type="number" />
  <button onclick="createTrip()">Add Trip</button>
</div>

<div class="card">
  <h3>Trips</h3>
  <ul id="tripList"></ul>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ✅ YOUR ACTUAL FIREBASE CONFIG (ALREADY INSERTED)
const firebaseConfig = {
  apiKey: "AIzaSyB10v8HtOdkNqzSt6VlLwb-2hCMyjK5FKk",
  authDomain: "khalorna-xpress-app.firebaseapp.com",
  projectId: "khalorna-xpress-app",
  storageBucket: "khalorna-xpress-app.firebasestorage.app",
  messagingSenderId: "926316181174",
  appId: "1:926316181174:web:b96a4a81269e7d7766d817"
};

// 🔌 Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📊 App State
let trips = [];

// 📡 REAL-TIME LISTENER
function listenToTrips() {
  onSnapshot(collection(db, "trips"), (snapshot) => {
    trips = [];
    snapshot.forEach(docSnap => {
      trips.push({ id: docSnap.id, ...docSnap.data() });
    });
    renderUI();
  });
}

// ➕ ADD TRIP
window.createTrip = async function () {
  const destination = document.getElementById("destination").value;
  const amount = Number(document.getElementById("amount").value);

  if (!destination || !amount) {
    alert("Enter destination and amount");
    return;
  }

  await addDoc(collection(db, "trips"), {
    destination,
    amount,
    status: "pending",
    createdAt: Date.now()
  });

  document.getElementById("destination").value = "";
  document.getElementById("amount").value = "";
};

// ✏️ UPDATE TRIP
window.markDone = async function (id) {
  const ref = doc(db, "trips", id);
  await updateDoc(ref, { status: "completed" });
};

// 🎨 RENDER UI
function renderUI() {
  const list = document.getElementById("tripList");
  const total = document.getElementById("totalTrips");
  const completed = document.getElementById("completedTrips");

  list.innerHTML = "";
  let completedCount = 0;

  trips.forEach(trip => {
    if (trip.status === "completed") completedCount++;

    const li = document.createElement("li");
    li.innerHTML = `${trip.destination} - JMD ${trip.amount} - ${trip.status}
      <button onclick="markDone('${trip.id}')">Done</button>`;

    list.appendChild(li);
  });

  total.textContent = trips.length;
  completed.textContent = completedCount;
}

// 🚀 INIT APP
listenToTrips();

</script>

</body>
</html>
