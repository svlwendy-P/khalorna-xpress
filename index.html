<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KX Executive Dashboard (UAT Stable)</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#0A1628; color:white; padding:20px; }
canvas { background:white; border-radius:10px; margin-top:20px; }
.card { background:#162447; padding:15px; border-radius:10px; margin-bottom:20px; }
</style>
</head>

<body>

<h2>Executive Summary</h2>
<div class="card">
<p>Total Revenue: JMD <span id="earnings">0</span></p>
<p>Total Trips: <span id="count">0</span></p>
<p>Average per Trip: JMD <span id="avg">0</span></p>
</div>

<h2>Driver Performance</h2>
<canvas id="driverChart"></canvas>

<h2>Monthly Revenue</h2>
<canvas id="monthChart"></canvas>

<script>

// INIT FIREBASE
firebase.initializeApp({
  apiKey: "AIzaSyB10v8HtOdkNqzSt6VlLwb-2hCMyjK5FKk",
  authDomain: "khalorna-xpress-app.firebaseapp.com",
  projectId: "khalorna-xpress-app"
});

const db = firebase.firestore();

// SAFE START
window.onload = async function () {
  console.log("UAT START");
  await loadDashboard();
};

async function loadDashboard(){

  let earnings = 0;
  let count = 0;
  let driverTotals = {};
  let monthlyTotals = {};

  const snapshot = await db.collection("archivedTrips").get();

  console.log("Records:", snapshot.size);

  snapshot.forEach(doc => {
    const t = doc.data();

    const amount = parseFloat(t.amount);
    if (isNaN(amount)) return;

    earnings += amount;
    count++;

    // DRIVER
    const driver = t.driver || "Unknown";
    driverTotals[driver] = (driverTotals[driver] || 0) + amount;

    // DATE FIX (CRITICAL)
    const timestamp = t.createdAt || t.archivedAt || Date.now();
    const date = new Date(timestamp);

    const key = date.toLocaleString("default", {
      month: "short",
      year: "numeric"
    });

    monthlyTotals[key] = (monthlyTotals[key] || 0) + amount;
  });

  // UPDATE UI
  document.getElementById("earnings").innerText = earnings;
  document.getElementById("count").innerText = count;
  document.getElementById("avg").innerText =
    count ? (earnings / count).toFixed(2) : 0;

  renderCharts(driverTotals, monthlyTotals);
}

// CHART RENDER WITH FALLBACK
function renderCharts(drivers, months){

  console.log("Rendering charts");

  // SAFE DEFAULTS
  const driverLabels = Object.keys(drivers);
  const driverData = Object.values(drivers);

  const monthLabels = Object.keys(months);
  const monthData = Object.values(months);

  // DRIVER CHART
  new Chart(document.getElementById("driverChart"), {
    type: 'bar',
    data: {
      labels: driverLabels.length ? driverLabels : ["No Data"],
      datasets: [{
        label: 'Driver Revenue',
        data: driverData.length ? driverData : [0]
      }]
    }
  });

  // MONTH CHART
  new Chart(document.getElementById("monthChart"), {
    type: 'line',
    data: {
      labels: monthLabels.length ? monthLabels : ["No Data"],
      datasets: [{
        label: 'Monthly Revenue',
        data: monthData.length ? monthData : [0]
      }]
    }
  });

  console.log("Charts rendered successfully");
}

</script>

</body>
</html>
