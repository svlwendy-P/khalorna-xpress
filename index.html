<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KX Dispatch System (Stable)</title>

<style>
body { font-family: Arial; margin:0; background:#0A1628; color:#fff; }
.nav { display:flex; background:#132040; padding:10px; gap:10px; }
.nav button { background:#1c2c50; color:white; border:none; padding:10px; cursor:pointer; }
.container { padding:20px; }
.card { background:#132040; padding:15px; margin-bottom:10px; border-radius:10px; }
input { padding:6px; margin:4px 0; width:100%; }
button { margin:3px; padding:6px 10px; }
.status { color:#00ffcc; font-weight:bold; }
</style>
</head>

<body>

<div class="nav">
  <button onclick="switchTab('dashboard')">Dashboard</button>
  <button onclick="switchTab('trips')">Trips</button>
  <button onclick="switchTab('archive')">Archive</button>
</div>

<div class="container">

<div id="dashboard">
  <div class="card">
    <h3>Summary</h3>
    <p>Total Trips: <span id="totalTrips">0</span></p>
    <p>Total Earnings: JMD <span id="totalEarnings">0</span></p>
  </div>
</div>

<div id="trips" style="display:none;">
  <div class="card">
    <h3>Add Trip</h3>
    <input id="destination" placeholder="Destination">
    <input id="amount" type="number" placeholder="Revenue">
    <button onclick="createTrip()">Add Trip</button>
  </div>

  <div class="card">
    <ul id="tripList"></ul>
  </div>
</div>

<div id="archive" style="display:none;">
  <div class="card">
    <h3>Archived Trips</h3>
    <ul id="archiveList"></ul>
  </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyB10v8HtOdkNqzSt6VlLwb-2hCMyjK5FKk",
  authDomain: "khalorna-xpress-app.firebaseapp.com",
  projectId: "khalorna-xpress-app"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let trips = [];
let archivedTrips = [];

/* NAV */
window.switchTab = function(tab){
  ["dashboard","trips","archive"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
  document.getElementById(tab).style.display="block";
};

/* CREATE */
window.createTrip = async function(){
  const destination = document.getElementById("destination").value;
  const amount = Number(document.getElementById("amount").value);

  if(!destination || !amount){
    alert("Enter valid data");
    return;
  }

  await addDoc(collection(db,"trips"),{
    destination,
    amount,
    status:"pending",
    createdAt: Date.now()
  });
};

/* STATUS UPDATE (FIXED) */
async function updateStatus(id, status){

  // 🔹 optimistic update
  const trip = trips.find(t=>t.id===id);
  if(trip){
    trip.status = status;
    renderTrips();
  }

  try {
    await updateDoc(doc(db,"trips",id), { status });

    if(status === "paid"){
      await archiveTrip(id);
    }

  } catch(e){
    console.error(e);
  }
}

/* ARCHIVE */
async function archiveTrip(id){
  const trip = trips.find(t=>t.id===id);
  if(!trip) return;

  await addDoc(collection(db,"archivedTrips"),{
    ...trip,
    archivedAt: Date.now()
  });

  await deleteDoc(doc(db,"trips",id));
}

/* SNAPSHOT (SAFE MERGE) */
onSnapshot(collection(db,"trips"), snap=>{
  const newTrips=[];

  snap.forEach(d=>{
    const data = { id:d.id, ...d.data() };

    const local = trips.find(t=>t.id===d.id);

    if(local && local.status !== data.status){
      data.status = local.status;
    }

    newTrips.push(data);
  });

  trips = newTrips;
  renderTrips();
});

onSnapshot(collection(db,"archivedTrips"), snap=>{
  archivedTrips=[];
  snap.forEach(d=>archivedTrips.push({id:d.id,...d.data()}));
  renderArchive();
});

/* RENDER TRIPS */
function renderTrips(){
  const list = document.getElementById("tripList");
  list.innerHTML="";

  let earnings=0;

  trips.forEach(t=>{
    if(t.status === "completed" || t.status === "paid"){
      earnings += t.amount;
    }

    const li=document.createElement("li");

    const label=document.createElement("span");
    label.innerHTML=`<b>${t.destination}</b> - <span class="status">${t.status}</span><br>`;
    li.appendChild(label);

    ["assigned","in_progress","completed","paid"].forEach(s=>{
      const btn=document.createElement("button");
      btn.textContent=s;
      btn.onclick=()=>updateStatus(t.id,s);
      li.appendChild(btn);
    });

    list.appendChild(li);
  });

  document.getElementById("totalTrips").textContent=trips.length;
  document.getElementById("totalEarnings").textContent=earnings;
}

/* RENDER ARCHIVE */
function renderArchive(){
  const list=document.getElementById("archiveList");
  list.innerHTML="";

  archivedTrips.forEach(t=>{
    const li=document.createElement("li");
    li.textContent=`${t.destination} - JMD ${t.amount}`;
    list.appendChild(li);
  });
}

</script>
</body>
</html>
