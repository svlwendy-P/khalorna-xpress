<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KX Executive Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#0A1628; color:white; padding:20px; }
canvas { background:white; border-radius:10px; margin-top:20px; }
</style>
</head>

<body>

<h2>Executive Summary</h2>
<p>Total Revenue: JMD <span id="earnings">0</span></p>
<p>Total Trips: <span id="count">0</span></p>
<p>Average per Trip: JMD <span id="avg">0</span></p>

<h2>Driver Performance</h2>
<canvas id="driverChart"></canvas>

<h2>Monthly Revenue</h2>
<canvas id="monthChart"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyB10v8HtOdkNqzSt6VlLwb-2hCMyjK5FKk",
  authDomain: "khalorna-xpress-app.firebaseapp.com",
  projectId: "khalorna-xpress-app"
});

const db = getFirestore(app);

// 🔥 FORCE SAFE LOAD
window.addEventListener("DOMContentLoaded", async () => {
  console.log("DOM Ready → Loading dashboard");
  await loadDashboard();
});

async function loadDashboard(){

  let earnings = 0;
  let count = 0;
  let driverTotals = {};
  let monthlyTotals = {};

  const snap = await getDocs(collection(db,"archivedTrips"));

  console.log("Archive records:", snap.size);

  snap.forEach(doc=>{
    const t = doc.data();

    const amount = parseFloat(t.amount);
    if(isNaN(amount)){
      console.warn("Invalid amount:", t.amount);
      return;
    }

    earnings += amount;
    count++;

    const driver = t.driver || "Unknown";
    driverTotals[driver] = (driverTotals[driver] || 0) + amount;

    const date = new Date(t.createdAt || Date.now());
    const key = date.toLocaleString("default",{month:"short",year:"numeric"});
    monthlyTotals[key] = (monthlyTotals[key] || 0) + amount;
  });

  console.log("Totals:", earnings, count);

  document.getElementById("earnings").innerText = earnings;
  document.getElementById("count").innerText = count;
  document.getElementById("avg").innerText = count ? (earnings/count).toFixed(2) : 0;

  renderCharts(driverTotals, monthlyTotals);
}

function renderCharts(drivers, months){

  const driverCanvas = document.getElementById("driverChart");
  const monthCanvas = document.getElementById("monthChart");

  if(!driverCanvas || !monthCanvas){
    console.error("Canvas missing");
    return;
  }

  console.log("Rendering charts...");

  new Chart(driverCanvas, {
    type: 'bar',
    data: {
      labels: Object.keys(drivers),
      datasets: [{
        label: 'Driver Revenue',
        data: Object.values(drivers)
      }]
    }
  });

  new Chart(monthCanvas, {
    type: 'line',
    data: {
      labels: Object.keys(months),
      datasets: [{
        label: 'Monthly Revenue',
        data: Object.values(months)
      }]
    }
  });
}

</script>

</body>
</html>
