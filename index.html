<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KX Final Stable</title>

<style>
body { font-family: Arial; background:#0A1628; color:white; }
.nav button { margin:5px; }
.card { padding:15px; margin:10px; background:#132040; border-radius:10px; }
</style>
</head>

<body>

<div class="nav">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('trips')">Trips</button>
<button onclick="show('archive')">Archive</button>
</div>

<div id="dashboard" class="card">
<h3>Summary</h3>
<p>Total Trips: <span id="count">0</span></p>
<p>Total Earnings: JMD <span id="earnings">0</span></p>
</div>

<div id="trips" class="card" style="display:none">
<h3>Add Trip</h3>
<input id="destination" placeholder="Destination"><br>
<input id="amount" type="number" placeholder="Revenue"><br>
<button onclick="addTrip()">Add</button>

<ul id="list"></ul>
</div>

<div id="archive" class="card" style="display:none">
<h3>Archive</h3>
<ul id="archiveList"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyB10v8HtOdkNqzSt6VlLwb-2hCMyjK5FKk",
  authDomain: "khalorna-xpress-app.firebaseapp.com",
  projectId: "khalorna-xpress-app"
});

const db = getFirestore(app);

let trips = [];
let archive = [];

/* NAV */
window.show = (id)=>{
["dashboard","trips","archive"].forEach(x=>{
document.getElementById(x).style.display="none";
});
document.getElementById(id).style.display="block";
};

/* ADD */
window.addTrip = async ()=>{
const dest = destination.value;
const amt = Number(amount.value);

if(!dest || !amt) return alert("Enter data");

await addDoc(collection(db,"trips"),{
destination:dest,
amount:amt,
status:"pending",
createdAt:Date.now()
});
};

/* UPDATE STATUS */
window.updateStatus = async(id,status)=>{
await updateDoc(doc(db,"trips",id),{status});

if(status==="paid"){
const trip = trips.find(t=>t.id===id);

await addDoc(collection(db,"archivedTrips"),{
...trip,
archivedAt:Date.now()
});

await deleteDoc(doc(db,"trips",id));
}
};

/* LISTEN TRIPS */
onSnapshot(collection(db,"trips"),snap=>{
trips=[];
snap.forEach(d=>trips.push({id:d.id,...d.data()}));
render();
});

/* LISTEN ARCHIVE */
onSnapshot(collection(db,"archivedTrips"),snap=>{
archive=[];
snap.forEach(d=>archive.push({id:d.id,...d.data()}));
renderArchive();
});

/* RENDER */
function render(){
list.innerHTML="";
let earn=0;

trips.forEach(t=>{

if(t.status==="completed" || t.status==="paid"){
earn+=t.amount;
}

const li=document.createElement("li");

li.innerHTML=`${t.destination} - ${t.status}`;

["assigned","in_progress","completed","paid"].forEach(s=>{
const b=document.createElement("button");
b.textContent=s;
b.onclick=()=>updateStatus(t.id,s);
li.appendChild(b);
});

list.appendChild(li);
});

count.textContent=trips.length;
earnings.textContent=earn;
}

/* ARCHIVE VIEW */
function renderArchive(){
archiveList.innerHTML="";
archive.forEach(t=>{
const li=document.createElement("li");
li.textContent=`${t.destination} - JMD ${t.amount}`;
archiveList.appendChild(li);
});
}
</script>

</body>
</html>
