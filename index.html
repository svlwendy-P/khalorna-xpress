<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalorna Xpress Enterprise System</title>

<style>
body { font-family: Arial; margin:0; background:#0A1628; color:#fff; }
.nav { display:flex; background:#132040; padding:10px; gap:10px; flex-wrap:wrap; }
.nav button { background:#1c2c50; color:white; border:none; padding:10px; cursor:pointer; }
.active { background:#2e4a9e !important; }
.container { padding:20px; }
.card { background:#132040; padding:15px; margin-bottom:10px; border-radius:10px; }
input { padding:6px; margin:4px 0; }
button { padding:6px 10px; }
.small { font-size:12px; opacity:0.8; }
</style>
</head>

<body>

<div class="nav">
  <button onclick="switchTab('dashboard')" id="tab-dashboard" class="active">Dashboard</button>
  <button onclick="switchTab('trips')" id="tab-trips">Trips</button>
  <button onclick="switchTab('earnings')" id="tab-earnings">Earnings</button>
  <button onclick="switchTab('drivers')" id="tab-drivers">Drivers</button>
  <button onclick="switchTab('reports')" id="tab-reports">Reports</button>
  <button onclick="switchTab('customers')" id="tab-customers">Customers</button>
</div>

<div class="container">

<div id="dashboard">
  <div class="card">
    <h3>Executive Dashboard</h3>
    <p>Total Trips: <span id="totalTrips">0</span></p>
    <p>Total Revenue: JMD <span id="totalRevenue">0</span></p>
    <p>Total Profit: JMD <span id="totalProfit">0</span></p>
  </div>
</div>

<div id="trips" style="display:none;">
  <div class="card">
    <h3>Add Trip</h3>
    <input id="destination" placeholder="Destination">
    <input id="amount" type="number" placeholder="Revenue">
    <input id="fuelCost" type="number" placeholder="Fuel Cost">
    <input id="driverPay" type="number" placeholder="Driver Pay">
    <input id="driverName" placeholder="Driver Name">
    <input id="customerName" placeholder="Customer Name">
    <button onclick="addTrip()">Add Trip</button>
  </div>

  <div class="card">
    <h3>Trips</h3>
    <ul id="tripList"></ul>
  </div>
</div>

<div id="earnings" style="display:none;">
  <div class="card">
    <h3>Financial Summary</h3>
    <p>Total Revenue: JMD <span id="totalRevenue2">0</span></p>
    <p>Total Profit: JMD <span id="totalProfit2">0</span></p>
  </div>
</div>

<div id="drivers" style="display:none;">
  <div class="card">
    <h3>Driver Earnings</h3>
    <ul id="driverEarningsList"></ul>
  </div>
</div>

<div id="reports" style="display:none;">
  <div class="card">
    <h3>Monthly Report</h3>
    <p id="monthlyReport"></p>
  </div>
</div>

<div id="customers" style="display:none;">
  <div class="card">
    <h3>Customer Revenue</h3>
    <ul id="customerList"></ul>
  </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB10v8HtOdkNqzSt6VlLwb-2hCMyjK5FKk",
  authDomain: "khalorna-xpress-app.firebaseapp.com",
  projectId: "khalorna-xpress-app"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let trips = [];

window.switchTab = function(tab) {
  document.querySelectorAll('[id^="tab-"]').forEach(b => b.classList.remove("active"));
  document.querySelectorAll('.container > div').forEach(d => d.style.display = "none");
  document.getElementById(tab).style.display = "block";
  document.getElementById("tab-"+tab).classList.add("active");
}

onSnapshot(collection(db, "trips"), (snapshot) => {
  trips = [];
  snapshot.forEach(doc => trips.push(doc.data()));
  render();
});

window.addTrip = async function() {
  const destination = destination.value;
  const amount = Number(amount.value);
  const fuelCost = Number(fuelCost.value||0);
  const driverPay = Number(driverPay.value||0);
  const driver = driverName.value;
  const customer = customerName.value;

  const profit = amount - (fuelCost + driverPay);

  await addDoc(collection(db, "trips"), {
    destination, amount, fuelCost, driverPay, driver, customer, profit, createdAt: Date.now()
  });
}

function render() {
  let revenue=0, profit=0;
  let drivers={}, customers={}, monthly=0;

  trips.forEach(t=>{
    revenue+=t.amount||0;
    profit+=t.profit||0;

    drivers[t.driver]=(drivers[t.driver]||0)+(t.driverPay||0);
    customers[t.customer]=(customers[t.customer]||0)+(t.amount||0);

    if(Date.now()-t.createdAt<2592000000) monthly+=t.profit||0;
  });

  totalTrips.textContent=trips.length;
  totalRevenue.textContent=revenue;
  totalProfit.textContent=profit;
  totalRevenue2.textContent=revenue;
  totalProfit2.textContent=profit;

  driverEarningsList.innerHTML="";
  Object.keys(drivers).forEach(d=>{
    driverEarningsList.innerHTML+=`<li>${d}: ${drivers[d]}</li>`;
  });

  customerList.innerHTML="";
  Object.keys(customers).forEach(c=>{
    customerList.innerHTML+=`<li>${c}: ${customers[c]}</li>`;
  });

  monthlyReport.textContent=`Monthly Profit: ${monthly}`;
}

</script>

</body>
</html>
