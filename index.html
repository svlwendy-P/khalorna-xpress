<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalorna Xpress System (PIN Login)</title>

<style>
body { font-family: Arial; margin:0; background:#0A1628; color:#fff; }
.nav { display:flex; background:#132040; padding:10px; gap:10px; flex-wrap:wrap; }
.nav button { background:#1c2c50; color:white; border:none; padding:10px; cursor:pointer; }
.active { background:#2e4a9e !important; }
.container { padding:20px; }
.card { background:#132040; padding:15px; margin-bottom:10px; border-radius:10px; }
input { padding:6px; margin:4px 0; }
button { padding:6px 10px; }
.hidden { display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginSection" class="container">
  <div class="card">
    <h3>Driver Login</h3>

    <input id="username" placeholder="Driver Name">
    <input id="pin" type="password" placeholder="4-digit PIN">

    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- APP -->
<div id="appSection" class="hidden">

<div class="nav">
  <button onclick="switchTab('dashboard')" id="tab-dashboard" class="active">Dashboard</button>
  <button onclick="switchTab('trips')">Trips</button>
  <button onclick="switchTab('earnings')">Earnings</button>
  <button onclick="switchTab('drivers')">Drivers</button>
  <button onclick="switchTab('customers')">Customers</button>
  <button onclick="switchTab('fleet')">Fleet</button>
</div>

<div class="container">

<div id="dashboard">
  <div class="card">
    <p>Total Trips: <span id="totalTrips">0</span></p>
    <p>Total Revenue: <span id="totalRevenue">0</span></p>
    <p>Total Profit: <span id="totalProfit">0</span></p>
  </div>
</div>

<div id="trips" style="display:none;">
  <div class="card">
    <input id="destination" placeholder="Destination">
    <input id="amount" type="number" placeholder="Revenue">
    <input id="fuelCost" type="number" placeholder="Fuel Cost">
    <input id="driverPay" type="number" placeholder="Driver Pay">
    <input id="customerName" placeholder="Customer">
    <input id="truckId" placeholder="Truck ID">
    <button onclick="addTrip()">Add Trip</button>
  </div>
  <ul id="tripList"></ul>
</div>

<div id="earnings" style="display:none;">
  <div class="card">
    <p>Total Revenue: <span id="totalRevenue2">0</span></p>
    <p>Total Profit: <span id="totalProfit2">0</span></p>
  </div>
</div>

<div id="drivers" style="display:none;"><ul id="driverEarningsList"></ul></div>
<div id="customers" style="display:none;"><ul id="customerList"></ul></div>
<div id="fleet" style="display:none;"><ul id="fleetList"></ul></div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB10v8HtOdkNqzSt6VlLwb-2hCMyjK5FKk",
  authDomain: "khalorna-xpress-app.firebaseapp.com",
  projectId: "khalorna-xpress-app"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let trips = [];
let currentUser = null;
let userRole = "driver";

// 🔐 PIN USERS (TEMP – replace with Firebase later)
const users = {
  "Diony": { pin: "1234", role: "driver" },
  "Admin": { pin: "9999", role: "admin" }
};

window.login = function() {
  const name = document.getElementById("username").value;
  const pin = document.getElementById("pin").value;

  if (!users[name] || users[name].pin !== pin) {
    alert("Invalid name or PIN");
    return;
  }

  currentUser = { name };
  userRole = users[name].role;

  document.getElementById("loginSection").style.display = "none";
  document.getElementById("appSection").classList.remove("hidden");
};

window.switchTab = function(tab) {
  document.querySelectorAll('.container > div').forEach(d => d.style.display="none");
  document.getElementById(tab).style.display="block";
};

window.addTrip = async function() {
  const destination = document.getElementById("destination").value;
  const amount = Number(document.getElementById("amount").value);
  const fuelCost = Number(document.getElementById("fuelCost").value||0);
  const driverPay = Number(document.getElementById("driverPay").value||0);
  const customer = document.getElementById("customerName").value;
  const truck = document.getElementById("truckId").value;

  const profit = amount - (fuelCost + driverPay);

  await addDoc(collection(db, "trips"), {
    destination, amount, fuelCost, driverPay,
    driver: currentUser.name,
    customer, truck, profit, createdAt: Date.now()
  });
};

onSnapshot(collection(db, "trips"), snapshot => {
  trips = [];
  snapshot.forEach(d => {
    const data = { ...d.data() };
    if(userRole === "admin" || data.driver === currentUser.name) trips.push(data);
  });
  render();
});

function render() {
  let revenue=0, profit=0;
  let drivers={}, customers={}, fleet={};

  tripList.innerHTML="";
  driverEarningsList.innerHTML="";
  customerList.innerHTML="";
  fleetList.innerHTML="";

  trips.forEach(t=>{
    revenue+=t.amount||0;
    profit+=t.profit||0;

    drivers[t.driver]=(drivers[t.driver]||0)+(t.driverPay||0);
    customers[t.customer]=(customers[t.customer]||0)+(t.amount||0);
    fleet[t.truck]=(fleet[t.truck]||0)+(t.profit||0);

    const li=document.createElement("li");
    li.innerHTML=`${t.destination} | ${t.driver} | Profit ${t.profit}`;
    tripList.appendChild(li);
  });

  Object.keys(drivers).forEach(d=>driverEarningsList.innerHTML+=`<li>${d}: ${drivers[d]}</li>`);
  Object.keys(customers).forEach(c=>customerList.innerHTML+=`<li>${c}: ${customers[c]}</li>`);
  Object.keys(fleet).forEach(f=>fleetList.innerHTML+=`<li>${f}: ${fleet[f]}</li>`);

  totalTrips.textContent=trips.length;
  totalRevenue.textContent=revenue;
  totalProfit.textContent=profit;
  totalRevenue2.textContent=revenue;
  totalProfit2.textContent=profit;
}

</script>

</body>
</html>
