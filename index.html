<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalorna Xpress App</title>

<style>
body { font-family: Arial; margin:0; background:#0A1628; color:#fff; }
.nav { display:flex; background:#132040; padding:10px; gap:10px; }
.nav button { background:#1c2c50; color:white; border:none; padding:10px; cursor:pointer; }
.active { background:#2e4a9e !important; }
.container { padding:20px; }
.card { background:#132040; padding:15px; margin-bottom:10px; border-radius:10px; }
input { padding:6px; margin:4px 0; }
button { padding:6px 10px; }
ul { padding-left: 18px; }
li { margin-bottom: 6px; }
.small { opacity: 0.8; font-size: 12px; }
</style>
</head>

<body>

<!-- NAVIGATION -->
<div class="nav">
  <button onclick="switchTab('dashboard')" id="tab-dashboard" class="active">Dashboard</button>
  <button onclick="switchTab('trips')" id="tab-trips">Trips</button>
  <button onclick="switchTab('earnings')" id="tab-earnings">Earnings</button>
</div>

<div class="container">

  <!-- DASHBOARD -->
  <div id="dashboard">
    <div class="card">
      <h3>Summary</h3>
      <p>Total Trips: <span id="totalTrips">0</span></p>
      <p>Completed Trips: <span id="completedTrips">0</span></p>
    </div>
  </div>

  <!-- TRIPS -->
  <div id="trips" style="display:none;">
    <div class="card">
      <h3>Add Trip</h3>
      <input id="destination" placeholder="Destination">
      <input id="amount" type="number" placeholder="Revenue (JMD)">
      <input id="fuelCost" type="number" placeholder="Fuel Cost (JMD)">
      <input id="driverPay" type="number" placeholder="Driver Pay (JMD)">
      <button onclick="addTrip()">Add Trip</button>
      <div class="small">Profit is auto-calculated as Revenue - (Fuel + Driver Pay)</div>
    </div>

    <div class="card">
      <h3>Trips List</h3>
      <ul id="tripList"></ul>
    </div>
  </div>

  <!-- EARNINGS -->
  <div id="earnings" style="display:none;">
    <div class="card">
      <h3>Earnings Summary</h3>
      <p>Total Revenue: JMD <span id="totalRevenue">0</span></p>
      <p>Total Profit: JMD <span id="totalProfit">0</span></p>
    </div>
  </div>

</div>

<script type="module">

// 🔹 Firebase Imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔹 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyB10v8HtOdkNqzSt6VlLwb-2hCMyjK5FKk",
  authDomain: "khalorna-xpress-app.firebaseapp.com",
  projectId: "khalorna-xpress-app",
  storageBucket: "khalorna-xpress-app.firebasestorage.app",
  messagingSenderId: "926316181174",
  appId: "1:926316181174:web:b96a4a81269e7d7766d817"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔹 STATE
let trips = [];

// 🔹 TAB SWITCHING
window.switchTab = function(tab) {
  ["dashboard","trips","earnings"].forEach(t => {
    document.getElementById(t).style.display = "none";
    document.getElementById("tab-"+t).classList.remove("active");
  });

  document.getElementById(tab).style.display = "block";
  document.getElementById("tab-"+tab).classList.add("active");
}

// 🔹 REAL-TIME DATA
onSnapshot(collection(db, "trips"), (snapshot) => {
  trips = [];
  snapshot.forEach(docSnap => {
    trips.push({ id: docSnap.id, ...docSnap.data() });
  });
  renderUI();
});

// 🔹 ADD TRIP (WITH EARNINGS MODEL)
window.addTrip = async function () {
  const destination = document.getElementById("destination").value;
  const amount = Number(document.getElementById("amount").value);
  const fuelCost = Number(document.getElementById("fuelCost").value || 0);
  const driverPay = Number(document.getElementById("driverPay").value || 0);

  if (!destination || !amount) {
    alert("Enter destination and revenue amount");
    return;
  }

  const profit = amount - (fuelCost + driverPay);

  await addDoc(collection(db, "trips"), {
    destination,
    amount,
    fuelCost,
    driverPay,
    profit,
    status: "pending",
    createdAt: Date.now()
  });

  document.getElementById("destination").value = "";
  document.getElementById("amount").value = "";
  document.getElementById("fuelCost").value = "";
  document.getElementById("driverPay").value = "";
};

// 🔹 UPDATE STATUS
window.markDone = async function(id) {
  await updateDoc(doc(db, "trips", id), {
    status: "completed"
  });
};

// 🔹 RENDER UI (DASHBOARD + TRIPS + EARNINGS)
function renderUI() {
  const list = document.getElementById("tripList");
  const totalTripsEl = document.getElementById("totalTrips");
  const completedTripsEl = document.getElementById("completedTrips");
  const revenueEl = document.getElementById("totalRevenue");
  const profitEl = document.getElementById("totalProfit");

  list.innerHTML = "";

  let completedCount = 0;
  let totalRevenue = 0;
  let totalProfit = 0;

  trips.forEach(trip => {
    if (trip.status === "completed") completedCount++;

    totalRevenue += Number(trip.amount || 0);
    totalProfit += Number(trip.profit || 0);

    const li = document.createElement("li");
    li.innerHTML = `
      <strong>${trip.destination || ""}</strong>
      <div class="small">
        Revenue: JMD ${trip.amount || 0} |
        Fuel: JMD ${trip.fuelCost || 0} |
        Driver: JMD ${trip.driverPay || 0} |
        Profit: JMD ${trip.profit || 0} |
        Status: ${trip.status || "pending"}
      </div>
      <button onclick="markDone('${trip.id}')">Mark Done</button>
    `;

    list.appendChild(li);
  });

  totalTripsEl.textContent = trips.length;
  completedTripsEl.textContent = completedCount;
  revenueEl.textContent = totalRevenue;
  profitEl.textContent = totalProfit;
}

</script>

</body>
</html>
