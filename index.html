<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalorna Xpress (Stable Build)</title>

<style>
body { font-family: Arial; margin:0; background:#0A1628; color:#fff; }
.nav { display:flex; background:#132040; padding:10px; gap:10px; }
.nav button { background:#1c2c50; color:white; border:none; padding:10px; cursor:pointer; }
.container { padding:20px; }
.card { background:#132040; padding:15px; margin-bottom:10px; border-radius:10px; }
input { padding:6px; margin:4px 0; width:100%; }
button { padding:6px 10px; margin-top:5px; cursor:pointer; }
</style>
</head>

<body>

<div class="nav">
  <button onclick="switchTab('dashboard')">Dashboard</button>
  <button onclick="switchTab('trips')">Trips</button>
  <button onclick="switchTab('archive')">Archive</button>
</div>

<div class="container">

<div id="dashboard">
  <div class="card">
    <h3>Summary</h3>
    <p>Total Trips: <span id="totalTrips">0</span></p>
    <p>Total Earnings: JMD <span id="totalEarnings">0</span></p>
  </div>
</div>

<div id="trips" style="display:none;">
  <div class="card">
    <h3>Add Trip</h3>
    <input id="destination" placeholder="Destination">
    <input id="amount" type="number" placeholder="Revenue">
    <input id="driver" placeholder="Driver">
    <input id="assistant" placeholder="Assistant">
    <button onclick="createTrip()">Add Trip</button>
  </div>

  <div class="card">
    <ul id="tripList"></ul>
  </div>
</div>

<div id="archive" style="display:none;">
  <div class="card">
    <h3>Archived Trips</h3>
    <ul id="archiveList"></ul>
  </div>

  <div class="card">
    <h3>Monthly Revenue</h3>
    <ul id="monthlyRevenue"></ul>
  </div>

  <div class="card">
    <h3>Driver Performance</h3>
    <ul id="driverPerformance"></ul>
  </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB10v8HtOdkNqzSt6VlLwb-2hCMyjK5FKk",
  authDomain: "khalorna-xpress-app.firebaseapp.com",
  projectId: "khalorna-xpress-app"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let trips = [];
let archivedTrips = [];

/* NAV */
window.switchTab = function(tab){
  document.getElementById("dashboard").style.display="none";
  document.getElementById("trips").style.display="none";
  document.getElementById("archive").style.display="none";
  document.getElementById(tab).style.display="block";
};

/* CREATE */
window.createTrip = async function(){
  const destination = document.getElementById("destination").value;
  const amount = Number(document.getElementById("amount").value);
  const driver = document.getElementById("driver").value;
  const assistant = document.getElementById("assistant").value;

  if(!destination || !amount){
    alert("Enter destination and amount");
    return;
  }

  await addDoc(collection(db,"trips"),{
    destination, amount, driver, assistant,
    status:"pending",
    driverPay: amount*0.2,
    assistantPay: amount*0.1,
    createdAt: Date.now()
  });
};

/* STATUS UPDATE (FIXED) */
window.updateStatus = async function(id, status){
  console.log("Updating:", id, status);

  try {
    await updateDoc(doc(db,"trips",id), { status });

    if(status === "paid"){
      await archiveTrip(id);
    }

  } catch(err){
    console.error("Update failed:", err);
  }
};

/* ARCHIVE (FIXED) */
async function archiveTrip(id){
  const trip = trips.find(t => t.id === id);
  if(!trip) return;

  const archiveData = {
    ...trip,
    archivedAt: Date.now(),
    archivedBy: "system"
  };

  try {
    await addDoc(collection(db,"archivedTrips"), archiveData);
    await deleteDoc(doc(db,"trips",id));
    console.log("Archived successfully");
  } catch(err){
    console.error("Archive failed:", err);
  }
}

/* LISTENERS */
onSnapshot(collection(db,"trips"), snap=>{
  trips=[];
  snap.forEach(d=>trips.push({id:d.id,...d.data()}));
  renderTrips();
});

onSnapshot(collection(db,"archivedTrips"), snap=>{
  archivedTrips=[];
  snap.forEach(d=>archivedTrips.push({id:d.id,...d.data()}));
  renderArchive();
});

/* RENDER TRIPS (FIXED BUTTON HANDLING) */
function renderTrips(){
  let earnings=0;
  const list = document.getElementById("tripList");
  list.innerHTML="";

  trips.forEach(t=>{
    if(t.status==="completed") earnings+=t.amount;

    const li=document.createElement("li");

    li.innerHTML=`
      <b>${t.destination}</b> - 
      <span style="color:#00ffcc">${t.status}</span><br>
    `;

    const statuses = ["assigned","in_progress","completed","paid"];

    statuses.forEach(s=>{
      const btn=document.createElement("button");
      btn.textContent=s;
      btn.onclick=()=>updateStatus(t.id,s);
      li.appendChild(btn);
    });

    list.appendChild(li);
  });

  document.getElementById("totalTrips").textContent=trips.length;
  document.getElementById("totalEarnings").textContent=earnings;
}

/* RENDER ARCHIVE + ANALYTICS */
function renderArchive(){

  archiveList.innerHTML="";
  monthlyRevenue.innerHTML="";
  driverPerformance.innerHTML="";

  let monthlyData = {};
  let driverData = {};

  archivedTrips.forEach(trip => {

    const li=document.createElement("li");
    li.innerHTML=`${trip.destination} - JMD ${trip.amount}<hr>`;
    archiveList.appendChild(li);

    const date = new Date(trip.createdAt);
    const key = date.toLocaleString('default',{month:'short',year:'numeric'});

    monthlyData[key]=(monthlyData[key]||0)+trip.amount;
    driverData[trip.driver]=(driverData[trip.driver]||0)+trip.amount;
  });

  Object.keys(monthlyData).forEach(m=>{
    const li=document.createElement("li");
    li.textContent=`${m}: JMD ${monthlyData[m]}`;
    monthlyRevenue.appendChild(li);
  });

  Object.keys(driverData).forEach(d=>{
    const li=document.createElement("li");
    li.textContent=`${d}: JMD ${driverData[d]}`;
    driverPerformance.appendChild(li);
  });
}
</script>

</body>
</html>
