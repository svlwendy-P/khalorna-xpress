<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KX Dashboard (Final Fix)</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0A1628; color:white; font-family:Arial; padding:20px; }
.card { background:#162447; padding:15px; border-radius:10px; margin-bottom:20px; }
canvas { background:white; margin-top:20px; border-radius:10px; }
</style>
</head>

<body>

<h2>Executive Summary</h2>
<div class="card">
  <p>Total Revenue: JMD <span id="earnings">Loading...</span></p>
  <p>Total Trips: <span id="count">Loading...</span></p>
  <p>Average: JMD <span id="avg">Loading...</span></p>
</div>

<h2>Driver Performance</h2>
<canvas id="driverChart"></canvas>

<h2>Monthly Revenue</h2>
<canvas id="monthChart"></canvas>

<script>

// INIT FIREBASE
firebase.initializeApp({
  apiKey: "AIzaSyB10v8HtOdkNqzSt6VlLwb-2hCMyjK5FKk",
  authDomain: "khalorna-xpress-app.firebaseapp.com",
  projectId: "khalorna-xpress-app"
});

const db = firebase.firestore();

// FORCE EXECUTION AFTER PAGE READY
window.onload = function () {
  setTimeout(loadDashboard, 300); // small delay ensures scripts loaded
};

async function loadDashboard(){

  console.log("START LOAD");

  let earnings = 0;
  let count = 0;
  let driverTotals = {};
  let monthlyTotals = {};

  try {

    const snapshot = await db.collection("archivedTrips").get();

    console.log("Docs:", snapshot.size);

    snapshot.forEach(doc => {

      const t = doc.data();

      const amount = parseFloat(t.amount);

      if (isNaN(amount)) {
        console.warn("Bad amount:", t.amount);
        return;
      }

      earnings += amount;
      count++;

      // DRIVER
      const driver = t.driver || "Unknown";
      driverTotals[driver] = (driverTotals[driver] || 0) + amount;

      // DATE FIX (CRITICAL)
      const ts = t.archivedAt || t.createdAt || Date.now();
      const date = new Date(ts);

      const key = date.toLocaleString("default", {
        month: "short",
        year: "numeric"
      });

      monthlyTotals[key] = (monthlyTotals[key] || 0) + amount;

    });

    // UPDATE KPI
    document.getElementById("earnings").innerText = earnings;
    document.getElementById("count").innerText = count;
    document.getElementById("avg").innerText =
      count ? (earnings / count).toFixed(2) : 0;

    // SAFETY CHECK
    if(count === 0){
      console.warn("No data found → charts will show default");
    }

    renderCharts(driverTotals, monthlyTotals);

  } catch (err) {
    console.error("LOAD ERROR:", err);
    alert("Error loading dashboard. Check console.");
  }
}

function renderCharts(drivers, months){

  console.log("Rendering charts");

  // FALLBACK DATA
  const dLabels = Object.keys(drivers).length ? Object.keys(drivers) : ["No Data"];
  const dData = Object.values(drivers).length ? Object.values(drivers) : [0];

  const mLabels = Object.keys(months).length ? Object.keys(months) : ["No Data"];
  const mData = Object.values(months).length ? Object.values(months) : [0];

  new Chart(document.getElementById("driverChart"), {
    type: 'bar',
    data: {
      labels: dLabels,
      datasets: [{
        label: 'Driver Revenue',
        data: dData
      }]
    }
  });

  new Chart(document.getElementById("monthChart"), {
    type: 'line',
    data: {
      labels: mLabels,
      datasets: [{
        label: 'Monthly Revenue',
        data: mData
      }]
    }
  });

  console.log("CHART SUCCESS");

}

</script>

</body>
</html>
