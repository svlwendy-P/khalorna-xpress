<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KX Analytics Dashboard</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyB10v8HtOdkNqzSt6VlLwb-2hCMyjK5FKk",
  authDomain: "khalorna-xpress-app.firebaseapp.com",
  projectId: "khalorna-xpress-app"
});

const db = getFirestore(app);

async function loadDashboard(){

  let earnings = 0;
  let driverTotals = {};
  let monthlyTotals = {};

  const archiveSnap = await getDocs(collection(db,"archivedTrips"));

  archiveSnap.forEach(doc=>{
    const t = doc.data();

    const amount = parseFloat(t.amount);
    if(isNaN(amount)) return;

    earnings += amount;

    // DRIVER
    const driver = t.driver || "Unknown";
    driverTotals[driver] = (driverTotals[driver] || 0) + amount;

    // MONTH
    const date = new Date(t.createdAt || Date.now());
    const key = date.toLocaleString("default",{month:"short",year:"numeric"});
    monthlyTotals[key] = (monthlyTotals[key] || 0) + amount;
  });

  render(earnings, driverTotals, monthlyTotals);
}

function render(earnings, drivers, months){

  document.getElementById("earnings").innerText = earnings;

  const driverList = document.getElementById("drivers");
  driverList.innerHTML = "";

  Object.keys(drivers).forEach(d=>{
    driverList.innerHTML += `<li>${d}: JMD ${drivers[d]}</li>`;
  });

  const monthList = document.getElementById("months");
  monthList.innerHTML = "";

  Object.keys(months).forEach(m=>{
    monthList.innerHTML += `<li>${m}: JMD ${months[m]}</li>`;
  });
}

window.onload = loadDashboard;
</script>
</head>

<body>

<h2>Total Earnings</h2>
<div id="earnings">0</div>

<h2>Driver Earnings</h2>
<ul id="drivers"></ul>

<h2>Monthly Revenue</h2>
<ul id="months"></ul>

</body>
</html>
