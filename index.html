<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalorna Xpress (Phase 1 Upgrade)</title>

<style>
body { font-family: Arial; margin:0; background:#0A1628; color:#fff; }
.nav { display:flex; background:#132040; padding:10px; gap:10px; }
.nav button { background:#1c2c50; color:white; border:none; padding:10px; cursor:pointer; }
.container { padding:20px; }
.card { background:#132040; padding:15px; margin-bottom:10px; border-radius:10px; }
input { padding:6px; margin:4px 0; width:100%; }
button { padding:6px 10px; margin-top:5px; cursor:pointer; }
.status { font-size:12px; opacity:0.8; }
</style>
</head>

<body>

<div class="nav">
  <button onclick="switchTab('dashboard')">Dashboard</button>
  <button onclick="switchTab('trips')">Trips</button>
</div>

<div class="container">

<div id="dashboard">
  <div class="card">
    <h3>Summary</h3>
    <p>Total Trips: <span id="totalTrips">0</span></p>
    <p>Total Earnings: JMD <span id="totalEarnings">0</span></p>
  </div>
</div>

<div id="trips" style="display:none;">
  <div class="card">
    <h3>Add Trip</h3>

    <input id="destination" placeholder="Destination">
    <input id="amount" type="number" placeholder="Revenue">

    <input id="driver" placeholder="Driver name">
    <input id="assistant" placeholder="Assistant name">

    <button id="addBtn" onclick="createTrip()">Add Trip</button>
  </div>

  <div class="card">
    <h3>Trips</h3>
    <ul id="tripList"></ul>
  </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔹 YOUR FIREBASE CONFIG (UNCHANGED) */
const firebaseConfig = {
  apiKey: "AIzaSyB10v8HtOdkNqzSt6VlLwb-2hCMyjK5FKk",
  authDomain: "khalorna-xpress-app.firebaseapp.com",
  projectId: "khalorna-xpress-app"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let trips = [];

/* 🔹 NAVIGATION */
window.switchTab = function(tab){
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("trips").style.display = "none";
  document.getElementById(tab).style.display = "block";
};

/* 🔹 CREATE TRIP (UPGRADED) */
window.createTrip = async function () {

  const destination = document.getElementById("destination").value;
  const amount = Number(document.getElementById("amount").value);
  const driver = document.getElementById("driver").value;
  const assistant = document.getElementById("assistant").value;

  if (!destination || !amount) {
    alert("Destination and Revenue required");
    return;
  }

  const btn = document.getElementById("addBtn");
  btn.disabled = true;

  try {
    await addDoc(collection(db, "trips"), {
      destination,
      amount,
      driver,
      assistant,
      status: "pending",
      driverPay: amount * 0.2,
      assistantPay: amount * 0.1,
      createdAt: Date.now()
    });

    /* Clear inputs */
    destination.value = "";
    amount.value = "";
    driver.value = "";
    assistant.value = "";

  } finally {
    btn.disabled = false;
  }
};

/* 🔹 STATUS UPDATE */
window.updateStatus = async function(id, status){
  await updateDoc(doc(db,"trips",id), { status });
};

/* 🔹 WHATSAPP NOTIFY */
window.notifyDriver = function(trip){
  const msg = `Trip Assigned\n${trip.destination}\nAmount: ${trip.amount}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
};

/* 🔹 REAL-TIME DATA */
onSnapshot(collection(db,"trips"), snapshot => {
  trips = [];
  snapshot.forEach(d => trips.push({ id:d.id, ...d.data() }));
  renderUI();
});

/* 🔹 RENDER */
function renderUI(){

  const list = document.getElementById("tripList");
  list.innerHTML = "";

  let totalEarnings = 0;

  trips.forEach(trip => {

    if(trip.status === "completed"){
      totalEarnings += trip.amount;
    }

    const li = document.createElement("li");

    li.innerHTML = `
      <b>${trip.destination}</b> - JMD ${trip.amount}<br>
      Status: ${trip.status}<br>
      Driver: ${trip.driver || "-"}<br>

      <button onclick="updateStatus('${trip.id}','assigned')">Assign</button>
      <button onclick="updateStatus('${trip.id}','in_progress')">Start</button>
      <button onclick="updateStatus('${trip.id}','completed')">Complete</button>
      <button onclick="updateStatus('${trip.id}','paid')">Paid</button>
      <button onclick='notifyDriver(${JSON.stringify(trip)})'>Notify</button>
    `;

    list.appendChild(li);
  });

  document.getElementById("totalTrips").textContent = trips.length;
  document.getElementById("totalEarnings").textContent = totalEarnings;
}

</script>

</body>
</html>
