<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalorna Xpress System (Offline Enabled)</title>

<style>
body { font-family: Arial; margin:0; background:#0A1628; color:#fff; }
.nav { display:flex; background:#132040; padding:10px; gap:10px; }
.nav button { background:#1c2c50; color:white; border:none; padding:10px; }
.container { padding:20px; }
.card { background:#132040; padding:15px; margin-bottom:10px; border-radius:10px; }
input { padding:6px; margin:4px 0; }
.hidden { display:none; }
.status { font-size:12px; }
</style>
</head>

<body>

<div id="loginSection" class="container">
  <div class="card">
    <h3>Login (PIN)</h3>
    <input id="username" placeholder="Driver Name">
    <input id="pin" type="password" placeholder="PIN">
    <button onclick="login()">Enter</button>
  </div>
</div>

<div id="appSection" class="hidden">

<div class="nav">
  <button onclick="switchTab('dashboard')">Dashboard</button>
  <button onclick="switchTab('trips')">Trips</button>
</div>

<div class="container">

<div id="dashboard">
  <div class="card">
    <p>Total Trips: <span id="totalTrips">0</span></p>
    <p>Total Profit: <span id="totalProfit">0</span></p>
    <p class="status">Status: <span id="syncStatus">Online</span></p>
  </div>
</div>

<div id="trips" style="display:none;">
  <div class="card">
    <input id="destination" placeholder="Destination">
    <input id="amount" type="number" placeholder="Revenue">
    <input id="fuelCost" type="number" placeholder="Fuel">
    <input id="driverPay" type="number" placeholder="Driver Pay">
    <button onclick="addTrip()">Add Trip</button>
  </div>
  <ul id="tripList"></ul>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB10v8HtOdkNqzSt6VlLwb-2hCMyjK5FKk",
  authDomain: "khalorna-xpress-app.firebaseapp.com",
  projectId: "khalorna-xpress-app"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = null;
let trips = [];

// LOCAL QUEUE FOR OFFLINE
let offlineQueue = JSON.parse(localStorage.getItem("offlineQueue") || "[]");

function updateStatus(){
  document.getElementById("syncStatus").textContent = navigator.onLine ? "Online" : "Offline";
}

window.addEventListener("online", async ()=>{
  updateStatus();
  await syncOfflineData();
});

window.addEventListener("offline", updateStatus);

updateStatus();

window.login = function(){
  currentUser = { name: document.getElementById("username").value };
  loginSection.style.display="none";
  appSection.classList.remove("hidden");
};

window.switchTab = function(tab){
  document.querySelectorAll('.container > div').forEach(d=>d.style.display='none');
  document.getElementById(tab).style.display='block';
}

window.addTrip = async function(){
  const trip = {
    destination: document.getElementById("destination").value,
    amount: Number(document.getElementById("amount").value),
    fuel: Number(document.getElementById("fuelCost").value||0),
    pay: Number(document.getElementById("driverPay").value||0),
    driver: currentUser.name,
    createdAt: Date.now()
  };

  trip.profit = trip.amount - (trip.fuel + trip.pay);

  if(navigator.onLine){
    await addDoc(collection(db,"trips"), trip);
  } else {
    offlineQueue.push(trip);
    localStorage.setItem("offlineQueue", JSON.stringify(offlineQueue));
    alert("Saved offline. Will sync when online.");
  }
};

async function syncOfflineData(){
  if(offlineQueue.length === 0) return;

  for(const trip of offlineQueue){
    try{
      await addDoc(collection(db,"trips"), trip);
    } catch(e){
      console.log("Retry failed", e);
      return;
    }
  }

  offlineQueue = [];
  localStorage.removeItem("offlineQueue");
  alert("Offline data synced successfully");
}

onSnapshot(collection(db,"trips"), snap=>{
  trips=[];
  snap.forEach(d=>trips.push(d.data()));
  render();
});

function render(){
  let total=0;
  tripList.innerHTML="";

  trips.forEach(t=>{
    total+=t.profit;
    const li=document.createElement("li");
    li.textContent=`${t.destination} | ${t.profit}`;
    tripList.appendChild(li);
  });

  totalTrips.textContent=trips.length;
  totalProfit.textContent=total;
}
