name: Deploy Khalorna Xpress

# Triggers: push to main, manual, AND daily at 10 PM Jamaica time (UTC-5 = 03:00 UTC)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC = 10:00 PM Jamaica (UTC-5)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure data file exists
        run: |
          mkdir -p data
          if [ ! -f data/kx_data.json ]; then
            echo '{"v":6,"nid":200,"note":"Initial empty data — app will populate on first use"}' > data/kx_data.json
            echo "Created initial kx_data.json"
          else
            echo "kx_data.json already exists"
          fi

      - name: Validate HTML file
        run: |
          if [ ! -f fleetflow.html ]; then
            echo "ERROR: fleetflow.html not found in repo root"
            exit 1
          fi
          echo "fleetflow.html found ($(wc -c < fleetflow.html) bytes)"

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post deployment summary
        run: |
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
